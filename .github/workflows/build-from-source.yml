name: Build Bun from Source (Patched for Android)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Bun version to build (e.g., 1.3.14)'
        required: true
        default: '1.3.14'
  schedule:
    # Build patched from-source version weekly (Sunday 00:00 UTC)
    # to catch upstream fixes
    - cron: '0 0 * * 0'

permissions:
  contents: write
  packages: write

jobs:
  build-from-source:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout this repo (for patch scripts)
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Freeing disk space ==="
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            curl wget git cmake ninja-build pkg-config \
            libssl-dev libcurl4-openssl-dev \
            golang-go ruby-full \
            xz-utils unzip jq python3 \
            ccache

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install Android NDK (provides clang 18 for cross-compilation)
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Make NDK clang the default (patches tools.ts to accept v18)
        env:
          NDK_ROOT: ${{ steps.setup_ndk.outputs.ndk-path }}
        run: |
          # The patches/tools.ts patch lowers the clang version requirement
          # from 21.1.x to 18.0.x and adds the NDK's bin dir to search paths.
          # Make NDK clang available as 'clang' and 'clang++' on PATH.
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "NDK bin: $NDK_BIN"
          ls "$NDK_BIN/" | grep -E "^clang" | head -5
          # The NDK ships aarch64-linux-android28-clang and clang (host)
          # Symlink NDK's host clang to /usr/local/bin
          sudo ln -sf "$NDK_BIN/clang" /usr/local/bin/clang
          sudo ln -sf "$NDK_BIN/clang++" /usr/local/bin/clang++
          sudo ln -sf "$NDK_BIN/llvm-ar" /usr/local/bin/llvm-ar
          sudo ln -sf "$NDK_BIN/llvm-ranlib" /usr/local/bin/llvm-ranlib
          sudo ln -sf "$NDK_BIN/ld.lld" /usr/local/bin/ld.lld
          sudo ln -sf "$NDK_BIN/llvm-strip" /usr/local/bin/llvm-strip
          # Verify
          clang --version
          clang++ --version

      - name: Clone Bun source
        env:
          BUN_VERSION: ${{ github.event.inputs.version || '1.3.14' }}
        run: |
          echo "=== Cloning Bun v$BUN_VERSION ==="
          git clone --depth 1 --branch "bun-v$BUN_VERSION" \
            https://github.com/oven-sh/bun.git /tmp/bun-src
          cd /tmp/bun-src
          git submodule update --init --recursive --depth 1
          echo "Source size: $(du -sh . | cut -f1)"

      - name: Apply Android/Termux patches (with strict verification)
        run: |
          echo "=== Applying patches ==="
          chmod +x scripts/apply-android-patches.sh
          bash scripts/apply-android-patches.sh /tmp/bun-src
          # The script itself verifies all patches and exits non-zero on failure.
          # If we reach here, all critical patches applied successfully.
          echo ""
          echo "=== Additional verification: root_path patch (THE bunx fix) ==="
          # The root_path patch changes `path[0..1]` (== "/") to just `path` (cwd)
          # so the walk-up loop never queues inaccessible ancestors like / and /data.
          # Verify three things:
          #   1. The ANDROID_TERMUX_FIX marker is present in resolver.zig
          #   2. The comment describing the root_path fix is present
          #   3. The old `path[0..1]` pattern is GONE from the root_path block
          PATCH_OK=true
          if grep -q "ANDROID_TERMUX_FIX" /tmp/bun-src/src/resolver/resolver.zig; then
            echo "  [OK] ANDROID_TERMUX_FIX marker present in resolver.zig"
          else
            echo "  [FAIL] ANDROID_TERMUX_FIX marker NOT in resolver.zig"
            PATCH_OK=false
          fi
          if grep -q "set root_path = path (the cwd itself)" /tmp/bun-src/src/resolver/resolver.zig; then
            echo "  [OK] root_path = path (cwd) comment present — prevents ancestor walk"
          else
            echo "  [FAIL] root_path fix comment NOT found"
            PATCH_OK=false
          fi
          # Extract the root_path block (5 lines after `const root_path`) and
          # confirm `path[0..1]` is gone. It should now end with just `path;`.
          ROOT_BLOCK=$(grep -A5 "const root_path" /tmp/bun-src/src/resolver/resolver.zig)
          if echo "$ROOT_BLOCK" | grep -q "path\[0\.\.1\]"; then
            echo "  [FAIL] old path[0..1] pattern still present — root_path NOT patched"
            PATCH_OK=false
          else
            echo "  [OK] old path[0..1] pattern removed from root_path block"
          fi
          if [ "$PATCH_OK" != "true" ]; then
            echo ""
            echo "  [FATAL] root_path verification failed — bunx will still crash."
            echo "  Patched root_path block:"
            echo "$ROOT_BLOCK"
            exit 1
          fi
          echo ""
          echo "  [SUCCESS] root_path patch verified — bunx should work!"
          echo ""
          echo "=== Show patched root_path block ==="
          grep -A5 "const root_path" /tmp/bun-src/src/resolver/resolver.zig
          echo ""
          echo "=== Show AccessDenied continue patch ==="
          grep -B1 -A4 "error.AccessDenied => {" /tmp/bun-src/src/resolver/resolver.zig

      - name: Install Bun for bootstrapping
        env:
          BUN_VERSION: ${{ github.event.inputs.version || '1.3.14' }}
        run: |
          # Bun's build system requires Bun itself for code generation
          echo "=== Installing Bun $BUN_VERSION for bootstrapping ==="
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Setup Zig (Bun manages this automatically)
        run: |
          # Bun's build script downloads Zig automatically
          # Just verify it will work
          echo "Zig will be installed by Bun's build system"

      - name: Build Bun for aarch64-linux-android (native Bionic binary)
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup_ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
          CCACHE_DIR: /tmp/ccache
          LDFLAGS: "-L${{ steps.setup_ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/28"
        run: |
          mkdir -p /tmp/ccache
          cd /tmp/bun-src
          echo "=== Building Bun for aarch64-linux-android ==="
          echo "NDK: $ANDROID_NDK_ROOT"
          echo "Bun: $(bun --version)"
          echo "Start: $(date)"

          # Nuke ALL caches to force 100% fresh recompile
          echo "=== Nuking ALL caches ==="
          rm -rf build/ 2>/dev/null || true
          rm -rf ~/.bun/build-cache/ 2>/dev/null || true
          rm -rf /tmp/zig-cache 2>/dev/null || true
          # Also clear Zig global cache
          rm -rf ~/.cache/zig 2>/dev/null || true

          # Use a unique build dir to prevent ANY cache reuse
          BUILD_DIR="build/fresh-$(date +%s)"
          echo "Using build dir: $BUILD_DIR"

          bun scripts/build.ts \
            --profile=release \
            --abi=android \
            --arch=aarch64 \
            --build-dir="$BUILD_DIR" 2>&1 | tail -100 || true

          echo "End: $(date)"
          echo ""
          echo "=== Checking for built binary ==="
          find build -name "bun*" -type f 2>/dev/null | head -10
          
          # Copy binary to expected location
          BUN_BIN=$(find build -name "bun-profile" -type f 2>/dev/null | head -1)
          if [ -z "$BUN_BIN" ]; then
            BUN_BIN=$(find build -name "bun" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$BUN_BIN" ]; then
            cp "$BUN_BIN" /tmp/bun-patched
            echo "Binary copied to /tmp/bun-patched"
          fi

      - name: Find and verify the built binary
        env:
          ANDROID_NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
        run: |
          echo "=== Looking for built binary ==="
          if [ -f /tmp/bun-patched ]; then
            echo "Binary already copied from build step"
          else
            find /tmp/bun-src/build -name "bun*" -type f 2>/dev/null | head -10
            BUN_BIN=$(find /tmp/bun-src/build -name "bun-profile" -type f 2>/dev/null | head -1)
            if [ -z "$BUN_BIN" ]; then
              BUN_BIN=$(find /tmp/bun-src/build -name "bun" -type f 2>/dev/null | head -1)
            fi
            if [ -z "$BUN_BIN" ]; then
              echo "ERROR: Bun binary not found"
              exit 1
            fi
            cp "$BUN_BIN" /tmp/bun-patched
          fi
          file /tmp/bun-patched
          ls -lh /tmp/bun-patched

          # Strip with NDK's llvm-strip
          NDK_STRIP="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          if [ -x "$NDK_STRIP" ]; then
            "$NDK_STRIP" --strip-all /tmp/bun-patched || true
            ls -lh /tmp/bun-patched
          fi

      - name: Verify the binary is Android-native
        run: |
          file /tmp/bun-patched
          # Should show: ELF 64-bit LSB pie executable, ARM aarch64, interpreter /system/bin/linker64
          if ! file /tmp/bun-patched | grep -q "aarch64"; then
            echo "ERROR: Binary is not aarch64"
            exit 1
          fi
          echo "=== Binary verification passed ==="
          echo "Native Android (Bionic) binary — runs on Termux via /system/bin/linker64"

      - name: Upload patched binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-patched-binary
          path: /tmp/bun-patched
          retention-days: 30

  package-deb:
    needs: build-from-source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dpkg-dev curl

      - name: Download patched binary
        uses: actions/download-artifact@v4
        with:
          name: bun-patched-binary
          path: runtime/

      - name: Download shim (from latest build-shim run)
        uses: actions/download-artifact@v4
        with:
          name: bun-android-shim
          path: dist/
        continue-on-error: true

      - name: Install Android NDK (for shim build if needed)
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r27c

      - name: Build shim if not downloaded
        env:
          ANDROID_NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
        run: |
          if [ ! -f dist/libbun-android-fix.so ]; then
            echo "Shim not found, building it..."
            NDK_TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
            CC="$NDK_TOOLCHAIN/bin/aarch64-linux-android29-clang"
            mkdir -p dist
            "$CC" -shared -fPIC -O2 -Wall -Wextra \
              -o dist/libbun-android-fix.so \
              src/libbun-android-fix.c \
              -ldl
            file dist/libbun-android-fix.so
          fi

      - name: Build DEB package (no proot needed!)
        env:
          VERSION: ${{ github.event.inputs.version || '1.3.14' }}
          ARCH: aarch64
        run: |
          set -e
          chmod +x runtime/bun-patched
          mkdir -p dist
          ROOT=$(mktemp -d)
          TMPUSR="$ROOT/data/data/com.termux/files/usr"
          mkdir -p "$ROOT/DEBIAN" "$TMPUSR/bin" "$TMPUSR/lib/bun-termux"

          # Install the PATCHED Bun binary
          install -m755 runtime/bun-patched "$TMPUSR/lib/bun-termux/bun"

          # Install the LD_PRELOAD shim (still useful for installer hardlinks)
          if [ -f dist/libbun-android-fix.so ]; then
            install -m755 dist/libbun-android-fix.so "$TMPUSR/lib/bun-termux/libbun-android-fix.so"
          fi

          # Launcher script — ALL commands run natively (no proot!)
          # bunx is fixed at source level via the resolver.zig patch:
          #   1. root_path = path (cwd) — prevents ancestor walk to / and /data
          #   2. AccessDenied → continue (not return null) — belt-and-suspenders
          #   3. readDirInfo null fallback — synthesizes minimal DirInfo from cwd
          cat > "$TMPUSR/bin/bun" <<'LAUNCHER'
          #!/data/data/com.termux/files/usr/bin/bash
          SHIM="/data/data/com.termux/files/usr/lib/bun-termux/libbun-android-fix.so"
          BUN_BIN="/data/data/com.termux/files/usr/lib/bun-termux/bun"
          if [ -z "$LD_PRELOAD" ]; then
            [ -f "$SHIM" ] && export LD_PRELOAD="$SHIM"
          else
            [ -f "$SHIM" ] && export LD_PRELOAD="$SHIM:$LD_PRELOAD"
          fi
          # Everything runs natively — bunx, bun run, bun install, bun build.
          # No proot needed. The resolver patches handle SELinux EACCES.
          exec "$BUN_BIN" "$@"
          LAUNCHER
          chmod 755 "$TMPUSR/bin/bun"

          # Network fix script
          install -m755 scripts/fix-bun-network.sh "$TMPUSR/bin/bun-fix-network"

          # Control file
          cat > "$ROOT/DEBIAN/control" <<EOF
          Package: bun
          Version: $VERSION-patched
          Architecture: $ARCH
          Maintainer: bd-loser
          Section: utils
          Priority: optional
          Description: Android-native Bun runtime (source-patched for Termux, bunx FIXED)
           Bun v$VERSION with source-level patches for Android SELinux compatibility.
           No proot, no root required. Works natively on Termux — including bunx.
           Patches: resolver.zig root_path=cwd + AccessDenied continue, run_command.zig
           readDirInfo null fallback, bun.zig openDir EACCES fallback.
          Depends: bash, ncurses, curl
          EOF
          echo "Installed-Size: $(du -sk "$ROOT" | cut -f1)" >> "$ROOT/DEBIAN/control"

          # Install postinst
          install -m755 packaging/deb/DEBIAN/postinst "$ROOT/DEBIAN/postinst"
          chmod 755 "$ROOT" "$ROOT/DEBIAN"

          # Build
          dpkg-deb --build --root-owner-group "$ROOT" "dist/bun_${VERSION}-patched_${ARCH}.deb"
          rm -rf "$ROOT"
          echo ""
          echo "=== Built: dist/bun_${VERSION}-patched_${ARCH}.deb ==="
          ls -la dist/

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-patched-deb
          path: dist/*.deb
          retention-days: 30

  release:
    needs: package-deb
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download DEB
        uses: actions/download-artifact@v4
        with:
          name: bun-patched-deb
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.3.14' }}-patched
          name: Bun for Termux v${{ github.event.inputs.version || '1.3.14' }} (Source-Patched)
          files: dist/*
          generate_release_notes: true
          body: |
            # Bun for Termux v${{ github.event.inputs.version || '1.3.14' }} — Source-Patched (bunx FIXED)

            This is Bun built from source with Android SELinux patches applied.
            **No proot, no root required.** Works natively on Termux — including `bunx`.

            ## What's patched (3-layer defense for the `bunx` crash)

            The root cause: Bun's directory resolver walks UP from the cwd to `/`
            and tries `opendir()` on every ancestor. On Android, `/` and `/data`
            are mode `0771` (system:system), so `opendir()` returns `EACCES` and
            the walk aborts — even though the cwd itself is fully readable. This
            only affected `bunx` because it's the only command that calls
            `configureEnvForRun` with the linker enabled, which triggers the
            directory walk before anything else.

            **Layer 1 — `src/resolver/resolver.zig` (THE fix):**
            - `root_path` changed from `path[0..1]` (`/`) to `path` (the cwd).
              The walk-up loop condition `top.len > root_path.len` is immediately
              false, so NO ancestors are queued. The walk processes only the cwd.
            - Walk error switch: `AccessDenied` now `continue`s to the next queue
              item instead of `return null`. Belt-and-suspenders — if an ancestor
              is somehow still queued, the walk won't abort.
            - `openDirAbsoluteZ` call site: `AccessDenied` converted to
              `FileNotFound` so the not-found cache path is taken cleanly.

            **Layer 2 — `src/cli/run_command.zig` (fallback):**
            - When `readDirInfo` still returns `null` (shouldn't happen with
              Layer 1, but just in case), synthesizes a minimal `DirInfo` from
              the cwd instead of returning `CouldntReadCurrentDirectory`.

            **Layer 3 — `src/bun.zig` (general Android compat):**
            - `openDirForIteration` and `openDirAbsolute`: on `EACCES`, retry
              without `O_DIRECTORY`. The fd won't support `readdir` but callers
              that only stat/access the path will work.

            ## Installation

            ```bash
            dpkg -i bun_${{ github.event.inputs.version || '1.3.14' }}-patched_aarch64.deb

            # If network issues (ConnectionRefused):
            bun-fix-network

            # Everything works natively — including bunx!
            bun install
            bun run index.ts
            bunx prettier --version
            bunx create-vite my-app
            bun build
            ```

            ## Build details

            - Built from `oven-sh/bun` tag `bun-v${{ github.event.inputs.version || '1.3.14' }}`
            - Patches applied: see `scripts/apply-android-patches.sh`
            - Cross-compiled with NDK r27c for `aarch64-unknown-linux-android28`
            - Build time: ~30-60 minutes in CI
