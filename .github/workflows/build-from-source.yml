name: Build Bun from Source (Patched for Android)

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/**'
      - 'src/**'
      - 'packaging/**'
      - 'Makefile'
      - '.github/workflows/build-from-source.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Bun version to build (e.g., 1.3.14)'
        required: true
        default: '1.3.14'
  schedule:
    # Build patched from-source version weekly (Sunday 00:00 UTC)
    # to catch upstream fixes
    - cron: '0 0 * * 0'

permissions:
  contents: write
  packages: write

jobs:
  build-from-source:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout this repo (for patch scripts)
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Freeing disk space ==="
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            curl wget git cmake ninja-build pkg-config \
            libssl-dev libcurl4-openssl-dev \
            golang-go ruby-full \
            xz-utils unzip jq python3 \
            ccache

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install Android NDK (provides clang 18 for cross-compilation)
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Make NDK clang the default (patches tools.ts to accept v18)
        env:
          NDK_ROOT: ${{ steps.setup_ndk.outputs.ndk-path }}
        run: |
          # The patches/tools.ts patch lowers the clang version requirement
          # from 21.1.x to 18.0.x and adds the NDK's bin dir to search paths.
          # Make NDK clang available as 'clang' and 'clang++' on PATH.
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "NDK bin: $NDK_BIN"
          ls "$NDK_BIN/" | grep -E "^clang" | head -5
          # The NDK ships aarch64-linux-android28-clang and clang (host)
          # Symlink NDK's host clang to /usr/local/bin
          sudo ln -sf "$NDK_BIN/clang" /usr/local/bin/clang
          sudo ln -sf "$NDK_BIN/clang++" /usr/local/bin/clang++
          sudo ln -sf "$NDK_BIN/llvm-ar" /usr/local/bin/llvm-ar
          sudo ln -sf "$NDK_BIN/llvm-ranlib" /usr/local/bin/llvm-ranlib
          sudo ln -sf "$NDK_BIN/ld.lld" /usr/local/bin/ld.lld
          sudo ln -sf "$NDK_BIN/llvm-strip" /usr/local/bin/llvm-strip
          # Verify
          clang --version
          clang++ --version

      - name: Clone Bun source
        env:
          BUN_VERSION: ${{ github.event.inputs.version || '1.3.14' }}
        run: |
          echo "=== Cloning Bun v$BUN_VERSION ==="
          git clone --depth 1 --branch "bun-v$BUN_VERSION" \
            https://github.com/oven-sh/bun.git /tmp/bun-src
          cd /tmp/bun-src
          git submodule update --init --recursive --depth 1
          echo "Source size: $(du -sh . | cut -f1)"

      - name: Apply Android/Termux patches (source + build, with strict verification)
        run: |
          echo "=== Applying patches (hybrid: source + shim) ==="
          chmod +x scripts/apply-android-patches.sh
          bash scripts/apply-android-patches.sh /tmp/bun-src
          # The script itself verifies all patches and exits non-zero on failure.
          echo ""
          echo "=== Verify source patches are applied (required for resolver walk) ==="
          # Source patches ARE needed because Bun's resolver uses raw syscalls
          # (Zig inline asm) that LD_PRELOAD cannot intercept. The shim handles
          # libc calls (linkat, fopen, etc.) but NOT the resolver's openat.
          PATCH_OK=true
          if grep -q "ANDROID_TERMUX_FIX" /tmp/bun-src/src/resolver/resolver.zig; then
            echo "  [OK] resolver.zig patched (AccessDenied continue + cache fix)"
          else
            echo "  [FAIL] resolver.zig NOT patched — bunx will crash!"
            PATCH_OK=false
          fi
          if grep -q "ANDROID_TERMUX_FIX" /tmp/bun-src/src/cli/run_command.zig; then
            echo "  [OK] run_command.zig patched (CouldntReadCurrentDirectory fallback)"
          else
            echo "  [FAIL] run_command.zig NOT patched"
            PATCH_OK=false
          fi
          if grep -q "ANDROID_TERMUX_FIX" /tmp/bun-src/src/exe_format/elf.zig; then
            echo "  [OK] elf.zig patched (bun build --compile fix — last PT_LOAD + overlap check)"
          else
            echo "  [FAIL] elf.zig NOT patched — bun build --compile will produce broken binaries"
            PATCH_OK=false
          fi
          if grep -q "ANDROID_TERMUX_FIX" /tmp/bun-src/scripts/build/config.ts; then
            echo "  [OK] config.ts patched (TinyCC enabled for Android — bun:ffi callback support)"
          else
            echo "  [FAIL] config.ts NOT patched — bun:ffi callback() will be disabled"
            PATCH_OK=false
          fi
          if grep -q "ANDROID_TERMUX_FIX" /tmp/bun-src/scripts/build/deps/tinycc.ts; then
            echo "  [OK] tinycc.ts patched (Android/Bionic defines added)"
          else
            echo "  [FAIL] tinycc.ts NOT patched — TinyCC won't build correctly for Android"
            PATCH_OK=false
          fi
          # Verify root_path is ORIGINAL (path[0..1]) — ancestor walking preserved!
          ROOT_BLOCK=$(grep -A5 "const root_path" /tmp/bun-src/src/resolver/resolver.zig)
          if echo "$ROOT_BLOCK" | grep -q "path\[0\.\.1\]"; then
            echo "  [OK] root_path = path[0..1] (ORIGINAL) — ancestor walking preserved (monorepo support!)"
          else
            echo "  [FAIL] root_path was changed — should be original path[0..1] for ancestor walking"
            PATCH_OK=false
          fi
          # Verify Layer 1a (AccessDenied => continue) is present
          if grep -q "error.AccessDenied => {" /tmp/bun-src/src/resolver/resolver.zig; then
            echo "  [OK] Layer 1a present (AccessDenied => continue in processing loop)"
          else
            echo "  [FAIL] Layer 1a missing — EACCES will abort the walk"
            PATCH_OK=false
          fi
          # Verify Layer 1b (cache .err AccessDenied fix) is present
          if grep -q "err.canonical_error != error.AccessDenied" /tmp/bun-src/src/resolver/resolver.zig; then
            echo "  [OK] Layer 1b present (cache .err doesn't return AccessDenied)"
          else
            echo "  [FAIL] Layer 1b missing — cached EACCES will propagate on subsequent walks"
            PATCH_OK=false
          fi
          if [ "$PATCH_OK" != "true" ]; then
            echo ""
            echo "  [FATAL] Source patch verification failed — bunx will crash."
            exit 1
          fi
          echo ""
          echo "  [SUCCESS] Source patches verified — bunx will work!"
          echo ""
          echo "=== Show patched root_path block ==="
          grep -A5 "const root_path" /tmp/bun-src/src/resolver/resolver.zig

      - name: Install Bun for bootstrapping
        env:
          BUN_VERSION: ${{ github.event.inputs.version || '1.3.14' }}
        run: |
          # Bun's build system requires Bun itself for code generation
          echo "=== Installing Bun $BUN_VERSION for bootstrapping ==="
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Setup Zig (Bun manages this automatically)
        run: |
          # Bun's build script downloads Zig automatically
          # Just verify it will work
          echo "Zig will be installed by Bun's build system"

      - name: Build Bun for aarch64-linux-android (native Bionic binary)
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup_ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
          CCACHE_DIR: /tmp/ccache
          LDFLAGS: "-L${{ steps.setup_ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/28"
        run: |
          mkdir -p /tmp/ccache
          cd /tmp/bun-src
          echo "=== Building Bun for aarch64-linux-android ==="
          echo "NDK: $ANDROID_NDK_ROOT"
          echo "Bun: $(bun --version)"
          echo "Start: $(date)"

          BUILD_DIR="build/release"

          # Run build and save FULL output (not just tail -100)
          # so we can see TinyCC compilation and Zig flags
          bun scripts/build.ts \
            --profile=release \
            --abi=android \
            --arch=aarch64 \
            --build-dir="$BUILD_DIR" > /tmp/build-output.log 2>&1 || true

          echo "End: $(date)"
          echo ""
          echo "=== Build output (last 200 lines) ==="
          tail -200 /tmp/build-output.log
          echo ""
          echo "=== Checking for TinyCC in build output ==="
          if grep -i "tinycc\|libtcc\|enable_tinycc" /tmp/build-output.log; then
            echo "[OK] TinyCC was found in build output"
          else
            echo "[WARN] TinyCC NOT found in build output — checking if enable_tinycc=true was passed"
            grep "enable_tinycc" /tmp/build-output.log || echo "[FAIL] enable_tinycc flag not found in build output"
          fi
          echo ""
          echo "=== Checking for built binary ==="
          find build -name "bun*" -type f 2>/dev/null | head -10

          # Copy binary to expected location
          BUN_BIN=$(find build -name "bun-profile" -type f 2>/dev/null | head -1)
          if [ -z "$BUN_BIN" ]; then
            BUN_BIN=$(find build -name "bun" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$BUN_BIN" ]; then
            cp "$BUN_BIN" /tmp/bun-patched
            echo "Binary copied to /tmp/bun-patched"
          fi

      - name: Find and verify the built binary
        env:
          ANDROID_NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
        run: |
          echo "=== Looking for built binary ==="
          if [ -f /tmp/bun-patched ]; then
            echo "Binary already copied from build step"
          else
            find /tmp/bun-src/build -name "bun*" -type f 2>/dev/null | head -10
            BUN_BIN=$(find /tmp/bun-src/build -name "bun-profile" -type f 2>/dev/null | head -1)
            if [ -z "$BUN_BIN" ]; then
              BUN_BIN=$(find /tmp/bun-src/build -name "bun" -type f 2>/dev/null | head -1)
            fi
            if [ -z "$BUN_BIN" ]; then
              echo "ERROR: Bun binary not found"
              exit 1
            fi
            cp "$BUN_BIN" /tmp/bun-patched
          fi
          file /tmp/bun-patched
          ls -lh /tmp/bun-patched

          # Strip with NDK's llvm-strip
          NDK_STRIP="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          if [ -x "$NDK_STRIP" ]; then
            "$NDK_STRIP" --strip-all /tmp/bun-patched || true
            ls -lh /tmp/bun-patched
          fi

          # Check if TinyCC is in the binary
          echo ""
          echo "=== Checking for TinyCC in binary ==="
          TCC_COUNT=$(strings /tmp/bun-patched | grep -ci "tcc\|tinycc\|libtcc")
          if [ "$TCC_COUNT" -gt 0 ]; then
            echo "[OK] TinyCC symbols found in binary ($TCC_COUNT matches)"
            strings /tmp/bun-patched | grep -i "tcc\|tinycc\|libtcc" | head -5
          else
            echo "[FAIL] No TinyCC symbols in binary — enable_tinycc was false at build time"
            echo "  This means callback() and linkSymbols(cc:true) will not work"
          fi

      - name: Verify the binary is Android-native
        run: |
          file /tmp/bun-patched
          # Should show: ELF 64-bit LSB pie executable, ARM aarch64, interpreter /system/bin/linker64
          if ! file /tmp/bun-patched | grep -q "aarch64"; then
            echo "ERROR: Binary is not aarch64"
            exit 1
          fi
          echo "=== Binary verification passed ==="
          echo "Native Android (Bionic) binary — runs on Termux via /system/bin/linker64"

      - name: Upload patched binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-patched-binary
          path: /tmp/bun-patched
          retention-days: 30

  package-deb:
    needs: build-from-source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dpkg-dev curl

      - name: Download patched binary
        uses: actions/download-artifact@v4
        with:
          name: bun-patched-binary
          path: runtime/

      - name: Download shim (from latest build-shim run)
        uses: actions/download-artifact@v4
        with:
          name: bun-android-shim
          path: dist/
        continue-on-error: true

      - name: Install Android NDK (for shim build if needed)
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r27c

      - name: Build shim if not downloaded
        env:
          ANDROID_NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
        run: |
          if [ ! -f dist/libbun-android-fix.so ]; then
            echo "Shim not found, building it..."
            NDK_TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
            CC="$NDK_TOOLCHAIN/bin/aarch64-linux-android29-clang"
            mkdir -p dist
            "$CC" -shared -fPIC -O2 -Wall -Wextra -Wno-nonnull-compare \
              -o dist/libbun-android-fix.so \
              src/libbun-android-fix.c \
              -ldl
            file dist/libbun-android-fix.so
          fi

      - name: Build DEB package (no proot needed!)
        env:
          VERSION: ${{ github.event.inputs.version || '1.3.14' }}
          ARCH: aarch64
        run: |
          set -e
          chmod +x runtime/bun-patched
          mkdir -p dist
          ROOT=$(mktemp -d)
          TMPUSR="$ROOT/data/data/com.termux/files/usr"
          mkdir -p "$ROOT/DEBIAN" "$TMPUSR/bin" "$TMPUSR/lib/bun-termux"

          # Install the PATCHED Bun binary
          install -m755 runtime/bun-patched "$TMPUSR/lib/bun-termux/bun"

          # Install the LD_PRELOAD shim (still useful for installer hardlinks)
          if [ -f dist/libbun-android-fix.so ]; then
            install -m755 dist/libbun-android-fix.so "$TMPUSR/lib/bun-termux/libbun-android-fix.so"
          fi

          # Launcher scripts — install the shared launcher-bun.sh and
          # launcher-bunx.sh from scripts/. These load the LD_PRELOAD
          # shim and exec the patched binary.
          #
          # CRITICAL: launcher-bunx.sh uses `exec -a "bunx"` to set
          # argv[0]="bunx" so Bun's isBunX() detection (src/cli/cli.zig)
          # routes to BunxCommand. Without a bunx launcher, `bunx`
          # would either be missing or fall through to the official
          # unpatched ~/.bun/bin/bunx (if installed via curl bun.sh).
          #
          # The source-level patches handle the directory walk EACCES:
          #   1. resolver.zig: root_path = path (cwd) — prevents ancestor walk
          #   2. resolver.zig: AccessDenied → continue (not return null)
          #   3. run_command.zig: readDirInfo null fallback — synthesize DirInfo
          install -m755 scripts/launcher-bun.sh  "$TMPUSR/bin/bun"
          install -m755 scripts/launcher-bunx.sh "$TMPUSR/bin/bunx"

          # Network fix script
          install -m755 scripts/fix-bun-network.sh "$TMPUSR/bin/bun-fix-network"

          # Verify both launchers were installed
          for bin in bun bunx; do
            if [ ! -x "$TMPUSR/bin/$bin" ]; then
              echo "FATAL: $TMPUSR/bin/$bin not installed"
              exit 1
            fi
          done
          echo "[OK] bun and bunx launchers installed"
          ls -la "$TMPUSR/bin/"

          # Control file
          cat > "$ROOT/DEBIAN/control" <<EOF
          Package: bun
          Version: $VERSION-patched
          Architecture: $ARCH
          Maintainer: bd-loser
          Section: utils
          Priority: optional
          Description: Android-native Bun runtime (hybrid patches for Termux, bunx FIXED)
           Bun v$VERSION with source patches (resolver.zig, run_command.zig) for
           the directory walk + LD_PRELOAD shim for libc calls. No proot, no root.
           Works natively on Termux — including bunx.
           Source: root_path=cwd, AccessDenied=continue, DirInfo fallback.
           Shim: linkat copy-on-EACCES, fopen DNS redirect, /tmp translate,
           execve shebang, /proc/stat fake.
          Depends: bash, ncurses, curl
          EOF
          echo "Installed-Size: $(du -sk "$ROOT" | cut -f1)" >> "$ROOT/DEBIAN/control"

          # Install postinst
          install -m755 packaging/deb/DEBIAN/postinst "$ROOT/DEBIAN/postinst"
          chmod 755 "$ROOT" "$ROOT/DEBIAN"

          # Build
          dpkg-deb --build --root-owner-group "$ROOT" "dist/bun_${VERSION}-patched_${ARCH}.deb"
          rm -rf "$ROOT"
          echo ""
          echo "=== Built: dist/bun_${VERSION}-patched_${ARCH}.deb ==="
          ls -la dist/

      - name: Verify deb contents (bun + bunx launchers)
        run: |
          set -e
          DEB=$(ls dist/bun_*-patched_*.deb | head -1)
          echo "Inspecting: $DEB"
          mkdir -p /tmp/deb-check
          dpkg-deb -x "$DEB" /tmp/deb-check
          echo ""
          echo "=== Files in /usr/bin/ ==="
          ls -la /tmp/deb-check/data/data/com.termux/files/usr/bin/
          echo ""
          # Both bun AND bunx launchers must be present
          for bin in bun bunx; do
            PATH="/tmp/deb-check/data/data/com.termux/files/usr/bin:$PATH"
            if [ ! -x "/tmp/deb-check/data/data/com.termux/files/usr/bin/$bin" ]; then
              echo "FATAL: $bin launcher missing from deb"
              exit 1
            fi
          done
          # Verify bunx launcher uses exec -a (the critical bit)
          BUNX_CONTENT="/tmp/deb-check/data/data/com.termux/files/usr/bin/bunx"
          if ! grep -q 'exec -a "bunx"' "$BUNX_CONTENT"; then
            echo "FATAL: bunx launcher does not use 'exec -a \"bunx\"'"
            echo "Content:"
            cat "$BUNX_CONTENT"
            exit 1
          fi
          echo "[OK] bun launcher present"
          echo "[OK] bunx launcher present and uses 'exec -a \"bunx\"'"
          rm -rf /tmp/deb-check

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-patched-deb
          path: dist/*.deb
          retention-days: 30

  release:
    needs: package-deb
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download DEB
        uses: actions/download-artifact@v4
        with:
          name: bun-patched-deb
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.3.14' }}-patched
          name: Bun for Termux v${{ github.event.inputs.version || '1.3.14' }} (Source-Patched)
          files: dist/*
          generate_release_notes: true
          body: |
            # Bun for Termux v${{ github.event.inputs.version || '1.3.14' }} — Hybrid (bunx FIXED, monorepo support!)

            This is Bun built from source with **source patches + LD_PRELOAD shim**.
            **No proot, no root required.** Works natively on Termux — including `bunx`.
            **Monorepo support works!** (ancestor walking preserved)

            ## Architecture: hybrid (source patches + shim)

            Two complementary fix layers are needed because Bun uses two different
            syscall paths:

            **1. Source patches (for the resolver walk)**
            Bun's directory resolver uses `std.fs.openDirAbsoluteZ` → Zig's
            `std.os.linux.openat` — a **raw syscall** (inline asm, NOT libc).
            LD_PRELOAD shims can ONLY intercept libc function calls, not raw syscalls.
            Therefore source patches are required:

            - `resolver.zig Layer 1a`: `AccessDenied => continue` instead of `return null`
              in the processing loop — skips inaccessible ancestors (/, /data) while
              still processing accessible ones. **Ancestor walking is PRESERVED**
              (monorepo support works!)
            - `resolver.zig Layer 1b`: DirEntry cache `.err` branch doesn't return
              `AccessDenied` — prevents cached EACCES on "/" from propagating on
              subsequent walks, bypassing Layer 1a
            - `run_command.zig Layer 2`: synthesize minimal `DirInfo` when `readDirInfo`
              returns null — final fallback to prevent `CouldntReadCurrentDirectory`

            **2. LD_PRELOAD shim (for libc calls)**
            `libbun-android-fix.so` intercepts libc-level calls that the source patches
            can't reach:

            - `linkat`/`symlinkat`/`renameat` copy-on-EACCES → fixes `bun install`
            - `fopen` redirect `/etc/resolv.conf` → `$PREFIX/etc/` → fixes DNS
            - `mkdir`/`symlink` translate `/tmp` → `$TMPDIR` → fixes `bun --bun`
            - `execve` shebang translation `/usr/bin/` → `$PREFIX/bin/`
            - `/proc/stat` faking via `memfd_create` → fixes `os.cpus()`

            **3. `bunx` launcher (packaging)**
            Uses `exec -a "bunx"` to set `argv[0]="bunx"` so Bun's `isBunX()` detection
            routes to `BunxCommand.exec()`.

            ## What changed from previous versions

            Previous versions had `Layer 1a: root_path = path` which prevented ancestor
            walking entirely (breaking monorepo support). This has been REPLACED with
            a two-part fix that preserves ancestor walking:

            - NEW Layer 1a: `AccessDenied => continue` (skips inaccessible ancestors)
            - NEW Layer 1b: cache `.err` branch doesn't return AccessDenied (cache fix)

            Together, these handle EACCES at both the processing and queueing phases,
            allowing the walk to complete naturally while skipping inaccessible dirs.

            ## Installation

            ```bash
            dpkg -i bun_${{ github.event.inputs.version || '1.3.14' }}-patched_aarch64.deb

            # If network issues (ConnectionRefused):
            bun-fix-network

            # Everything works natively — including bunx!
            bun install
            bun run index.ts
            bunx prettier --version
            bunx create-vite my-app
            bun build
            ```

            ## Build details

            - Built from `oven-sh/bun` tag `bun-v${{ github.event.inputs.version || '1.3.14' }}`
            - Patches applied: see `scripts/apply-android-patches.sh`
            - Cross-compiled with NDK r27c for `aarch64-unknown-linux-android28`
            - Build time: ~30-60 minutes in CI
