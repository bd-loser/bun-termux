name: Build Bun from Source (Patched for Android)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Bun version to build (e.g., 1.3.14)'
        required: true
        default: '1.3.14'
  schedule:
    # Build patched from-source version weekly (Sunday 00:00 UTC)
    # to catch upstream fixes
    - cron: '0 0 * * 0'

permissions:
  contents: write
  packages: write

jobs:
  build-from-source:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout this repo (for patch scripts)
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Freeing disk space ==="
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            curl wget git cmake ninja-build pkg-config \
            libssl-dev libcurl4-openssl-dev \
            golang-go ruby-full \
            xz-utils unzip jq python3 \
            ccache \
            lsb-release software-properties-common gnupg

      - name: Install LLVM 21 (Bun requires exactly 21.1.x)
        run: |
          # Bun's build system enforces LLVM 21.1.0-21.1.99
          # Add the official LLVM apt repository
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -y
          sudo apt-get install -y \
            llvm-21 \
            clang-21 \
            lld-21 \
            libclang-21-dev \
            libpolly-21-dev
          # Set as default
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-21 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-21 100
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-21 100
          sudo update-alternatives --install /usr/bin/lld lld /usr/bin/lld-21 100
          clang --version

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        # Note: we don't install the aarch64-unknown-linux-android target
        # because Rust doesn't distribute rust-std for Android nightlies.
        # Bun's build system uses Zig for cross-compilation, not Rust's
        # own cross-compile, so the host Rust toolchain is sufficient.

      - name: Install Android NDK (kept for shim build)
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Clone Bun source
        env:
          BUN_VERSION: ${{ github.event.inputs.version || '1.3.14' }}
        run: |
          echo "=== Cloning Bun v$BUN_VERSION ==="
          git clone --depth 1 --branch "bun-v$BUN_VERSION" \
            https://github.com/oven-sh/bun.git /tmp/bun-src
          cd /tmp/bun-src
          git submodule update --init --recursive --depth 1
          echo "Source size: $(du -sh . | cut -f1)"

      - name: Apply Android SELinux patches
        run: |
          echo "=== Applying patches ==="
          chmod +x scripts/apply-android-patches.sh
          bash scripts/apply-android-patches.sh /tmp/bun-src
          echo ""
          echo "=== Verify patches ==="
          grep -n "ANDROID_SELINUX_FIX_PATCH" /tmp/bun-src/src/bun.zig
          grep -n "ANDROID_SELINUX_FIX_PATCH" /tmp/bun-src/src/cli/run_command.zig

      - name: Install Bun for bootstrapping
        env:
          BUN_VERSION: ${{ github.event.inputs.version || '1.3.14' }}
        run: |
          # Bun's build system requires Bun itself for code generation
          echo "=== Installing Bun $BUN_VERSION for bootstrapping ==="
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Setup Zig (Bun manages this automatically)
        run: |
          # Bun's build script downloads Zig automatically
          # Just verify it will work
          echo "Zig will be installed by Bun's build system"

      - name: Build Bun for aarch64-linux-musl (static binary, runs natively on Termux)
        env:
          CCACHE_DIR: /tmp/ccache
        run: |
          mkdir -p /tmp/ccache
          cd /tmp/bun-src
          echo "=== Building Bun for aarch64-linux-musl ==="
          echo "Bun: $(bun --version)"
          echo "Start: $(date)"

          # Build for musl target — produces a static binary that runs on
          # Termux without grun/proot. The SELinux patches in the source
          # fix the openat() EACCES issue regardless of target ABI.
          bun scripts/build.ts \
            --profile=release \
            --abi=musl \
            --arch=aarch64 \
            --build-dir=build/release-musl 2>&1 | tail -100

          echo "End: $(date)"

      - name: Find and verify the built binary
        run: |
          echo "=== Looking for built binary ==="
          find /tmp/bun-src/build -name "bun" -type f 2>/dev/null | head -10
          find /tmp/bun-src -maxdepth 3 -name "bun" -type f -executable 2>/dev/null | head -10

          BUN_BIN=$(find /tmp/bun-src/build -name "bun" -type f 2>/dev/null | head -1)
          if [ -z "$BUN_BIN" ]; then
            echo "ERROR: Bun binary not found in build output"
            echo "=== Build directory contents ==="
            ls -la /tmp/bun-src/build/ 2>/dev/null || echo "No build dir"
            find /tmp/bun-src/build -maxdepth 3 -type f -name "*.o" 2>/dev/null | wc -l
            echo "Object files count above — if 0, zig compile failed"
            exit 1
          fi
          echo "Found: $BUN_BIN"
          file "$BUN_BIN"
          ls -lh "$BUN_BIN"
          cp "$BUN_BIN" /tmp/bun-patched

      - name: Verify the binary is aarch64 musl-static
        run: |
          file /tmp/bun-patched
          # Should show: ELF 64-bit LSB executable, ARM aarch64, statically linked
          if ! file /tmp/bun-patched | grep -q "aarch64"; then
            echo "ERROR: Binary is not aarch64"
            exit 1
          fi
          echo "=== Binary verification passed ==="
          echo "Musl-static binaries run natively on Termux (no grun/proot needed)"

      - name: Upload patched binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-patched-binary
          path: /tmp/bun-patched
          retention-days: 30

  package-deb:
    needs: build-from-source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dpkg-dev curl

      - name: Download patched binary
        uses: actions/download-artifact@v4
        with:
          name: bun-patched-binary
          path: runtime/

      - name: Download shim (from latest build-shim run)
        uses: actions/download-artifact@v4
        with:
          name: bun-android-shim
          path: dist/
        continue-on-error: true

      - name: Install Android NDK (for shim build if needed)
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r27c

      - name: Build shim if not downloaded
        env:
          ANDROID_NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
        run: |
          if [ ! -f dist/libbun-android-fix.so ]; then
            echo "Shim not found, building it..."
            NDK_TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
            CC="$NDK_TOOLCHAIN/bin/aarch64-linux-android29-clang"
            mkdir -p dist
            "$CC" -shared -fPIC -O2 -Wall -Wextra \
              -o dist/libbun-android-fix.so \
              src/libbun-android-fix.c \
              -ldl
            file dist/libbun-android-fix.so
          fi

      - name: Build DEB package (no proot needed!)
        env:
          VERSION: ${{ github.event.inputs.version || '1.3.14' }}
          ARCH: aarch64
        run: |
          set -e
          chmod +x runtime/bun-patched
          mkdir -p dist
          ROOT=$(mktemp -d)
          TMPUSR="$ROOT/data/data/com.termux/files/usr"
          mkdir -p "$ROOT/DEBIAN" "$TMPUSR/bin" "$TMPUSR/lib/bun-termux"

          # Install the PATCHED Bun binary
          install -m755 runtime/bun-patched "$TMPUSR/lib/bun-termux/bun"

          # Install the LD_PRELOAD shim (still useful for installer hardlinks)
          if [ -f dist/libbun-android-fix.so ]; then
            install -m755 dist/libbun-android-fix.so "$TMPUSR/lib/bun-termux/libbun-android-fix.so"
          fi

          # Launcher script — NO PROOT NEEDED! The binary is patched at source level.
          cat > "$TMPUSR/bin/bun" <<'LAUNCHER'
          #!/data/data/com.termux/files/usr/bin/bash
          # Bun with source-level Android SELinux patches — no proot needed!
          # The LD_PRELOAD shim is still loaded for installer hardlink fixes.
          SHIM="/data/data/com.termux/files/usr/lib/bun-termux/libbun-android-fix.so"
          if [ -f "$SHIM" ]; then
            if [ -z "$LD_PRELOAD" ]; then
              export LD_PRELOAD="$SHIM"
            else
              export LD_PRELOAD="$SHIM:$LD_PRELOAD"
            fi
          fi
          exec /data/data/com.termux/files/usr/lib/bun-termux/bun "$@"
          LAUNCHER
          chmod 755 "$TMPUSR/bin/bun"

          # Network fix script
          install -m755 scripts/fix-bun-network.sh "$TMPUSR/bin/bun-fix-network"

          # Control file
          cat > "$ROOT/DEBIAN/control" <<EOF
          Package: bun
          Version: $VERSION-patched
          Architecture: $ARCH
          Maintainer: bd-loser
          Section: utils
          Priority: optional
          Description: Android-native Bun runtime (source-patched for Termux)
           Bun v$VERSION with source-level patches for Android SELinux compatibility.
           No proot, no root required. Works natively on Termux.
           Patches: open_dir_absolute_z EACCES fallback, CouldntReadCurrentDirectory cwd fallback.
          Depends: bash, ncurses, curl
          EOF
          echo "Installed-Size: $(du -sk "$ROOT" | cut -f1)" >> "$ROOT/DEBIAN/control"

          # Install postinst
          install -m755 packaging/deb/DEBIAN/postinst "$ROOT/DEBIAN/postinst"
          chmod 755 "$ROOT" "$ROOT/DEBIAN"

          # Build
          dpkg-deb --build --root-owner-group "$ROOT" "dist/bun_${VERSION}-patched_${ARCH}.deb"
          rm -rf "$ROOT"
          echo ""
          echo "=== Built: dist/bun_${VERSION}-patched_${ARCH}.deb ==="
          ls -la dist/

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-patched-deb
          path: dist/*.deb
          retention-days: 30

  release:
    needs: package-deb
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download DEB
        uses: actions/download-artifact@v4
        with:
          name: bun-patched-deb
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.3.14' }}-patched
          name: Bun for Termux v${{ github.event.inputs.version || '1.3.14' }} (Source-Patched)
          files: dist/*
          generate_release_notes: true
          body: |
            # Bun for Termux v${{ github.event.inputs.version || '1.3.14' }} — Source-Patched

            This is Bun built from source with Android SELinux patches applied.
            **No proot, no root required.** Works natively on Termux.

            ## What's patched

            1. **`open_dir_absolute_z()`** in `src/resolver/resolver.rs`:
               When `openat(O_DIRECTORY)` returns EACCES (Android SELinux blocks
               this on `/` and `/data/`), retries without `O_DIRECTORY`. The fd
               won't support `readdir` (ENOTDIR), so the resolver treats the
               directory as empty — correct since `/` and `/data/` don't contain
               `package.json`.

            2. **`open_dir_z()`** in `src/resolver/resolver.rs`:
               Same EACCES fallback for the relative-path version.

            3. **`CouldntReadCurrentDirectory` error path** in `src/runtime/cli/run_command.rs`:
               When `read_dir_info` returns `Ok(None)` on Android (directory walk
               blocked by SELinux), falls back to using the cwd as `top_level_dir`
               instead of failing fatally.

            ## Installation

            ```bash
            dpkg -i bun_${{ github.event.inputs.version || '1.3.14' }}-patched_aarch64.deb

            # If network issues (ConnectionRefused):
            bun-fix-network

            # Everything works natively — no proot needed!
            bun install
            bun run index.ts
            bun dev
            bun build
            ```

            ## Build details

            - Built from `oven-sh/bun` tag `bun-v${{ github.event.inputs.version || '1.3.14' }}`
            - Patches applied: see `scripts/apply-android-patches.sh`
            - Cross-compiled with NDK r27c for `aarch64-unknown-linux-android28`
            - Build time: ~30-60 minutes in CI
