name: Build Bun Termux

on:
  push:
    branches: [main, master]
    paths:
      - 'packaging/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/build.yml'
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g., 1.3.15)'
        required: false
        default: ''
  schedule:
    # Check for new Bun releases daily at 09:00 UTC
    - cron: '0 9 * * *'

permissions:
  contents: write
  packages: write

jobs:
  check-latest:
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.check.outputs.latest }}
      current: ${{ steps.check.outputs.current }}
      should_bump: ${{ steps.check.outputs.should_bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check latest Bun release
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/oven-sh/bun/releases/latest | jq -r .tag_name | sed 's/bun-v//')
          CURRENT=$(grep '^PKGVER ?=' Makefile | awk '{print $3}')
          echo "Latest upstream: $LATEST"
          echo "Current repo:    $CURRENT"
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$LATEST" != "$CURRENT" ] && [ -n "$LATEST" ]; then
            echo "should_bump=true" >> $GITHUB_OUTPUT
            echo "New version detected: $LATEST (current: $CURRENT)"
          else
            echo "should_bump=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-bump version on schedule
        if: github.event_name == 'schedule' && steps.check.outputs.should_bump == 'true'
        run: |
          LATEST=${{ steps.check.outputs.latest }}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          sed -i "s/^PKGVER ?=.*/PKGVER ?= $LATEST/" Makefile
          sed -i "s/^pkgver=.*/pkgver=$LATEST/" packaging/pacman/PKGBUILD 2>/dev/null || true
          sed -i "s/^pkgver=.*/pkgver=$LATEST/" packaging/pacman/PKGBUILD.aarch64 2>/dev/null || true
          git add Makefile packaging/pacman/PKGBUILD*
          git commit -m "chore: bump Bun to v$LATEST"
          git push
          echo "Pushed version bump to $LATEST"

  build-deb:
    needs: check-latest
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl unzip dpkg-dev jq

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ needs.check-latest.outputs.latest }}"
          fi
          echo "Building version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Bun Android binary
        env:
          BUN_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p runtime
          echo "Downloading Bun v${BUN_VERSION} for android-aarch64..."
          curl -fL "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-aarch64-android.zip" -o /tmp/bun.zip
          unzip -o /tmp/bun.zip -d /tmp/bun-extract
          BUN_BIN=$(find /tmp/bun-extract -name "bun" -type f | head -1)
          if [ -z "$BUN_BIN" ]; then
            echo "ERROR: bun binary not found in zip"
            ls -la /tmp/bun-extract/
            exit 1
          fi
          cp "$BUN_BIN" runtime/bun
          chmod +x runtime/bun
          file runtime/bun
          echo "Binary size: $(stat -c%s runtime/bun) bytes"

      - name: Build DEB package
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          ARCH: aarch64
        run: |
          set -e
          mkdir -p dist
          ROOT=$(mktemp -d)
          TMPUSR="$ROOT/data/data/com.termux/files/usr"
          mkdir -p "$ROOT/DEBIAN" "$TMPUSR/bin" "$TMPUSR/lib/bun-termux"
          install -m755 runtime/bun "$TMPUSR/lib/bun-termux/bun"
          # Launcher script (heredoc content is at column 0 after YAML strips common indent)
          cat > "$TMPUSR/bin/bun" <<'LAUNCHER'
          #!/data/data/com.termux/files/usr/bin/bash
          exec /data/data/com.termux/files/usr/lib/bun-termux/bun "$@"
          LAUNCHER
          chmod 755 "$TMPUSR/bin/bun"
          # Network fix script
          install -m755 scripts/fix-bun-network.sh "$TMPUSR/bin/bun-fix-network"
          # Control file — continuation lines start with ONE space (Debian format).
          # YAML strips the common 10-space indent from all lines in this block,
          # leaving 0 spaces for field lines and 1 space for continuation lines.
          cat > "$ROOT/DEBIAN/control" <<EOF
          Package: bun
          Version: $VERSION
          Architecture: $ARCH
          Maintainer: bd-loser
          Section: utils
          Priority: optional
          Description: Android-native Bun runtime for Termux Bionic + auto network fix
           This package contains the Android-native Bun runtime (Bionic-linked)
           plus a bun-fix-network helper that solves ConnectionRefused errors
           caused by Bun's c-ares DNS resolver on Termux.
          Depends: bash, ncurses, curl
          EOF
          echo "Installed-Size: $(du -sk "$ROOT" | cut -f1)" >> "$ROOT/DEBIAN/control"
          # Install postinst
          install -m755 packaging/deb/DEBIAN/postinst "$ROOT/DEBIAN/postinst"
          # Set perms
          chmod 755 "$ROOT" "$ROOT/DEBIAN"
          # Build
          dpkg-deb --build "$ROOT" "dist/bun_${VERSION}_${ARCH}.deb"
          rm -rf "$ROOT"
          echo ""
          echo "=== Built: dist/bun_${VERSION}_${ARCH}.deb ==="
          ls -la dist/

      - name: Verify DEB contents
        run: |
          echo "=== DEB file listing ==="
          dpkg-deb -c dist/*.deb
          echo ""
          echo "=== Control file ==="
          dpkg-deb -I dist/*.deb
          echo ""
          echo "=== postinst script ==="
          dpkg-deb -e dist/*.deb /tmp/extracted-control
          cat /tmp/extracted-control/postinst

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-deb-aarch64
          path: dist/*.deb
          retention-days: 30

  build-pacman:
    needs: check-latest
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/termux/package-builder:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use override version or latest
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ needs.check-latest.outputs.latest }}"
          fi
          echo "Building version: $VERSION"
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" packaging/pacman/PKGBUILD 2>/dev/null || true
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" packaging/pacman/PKGBUILD.aarch64 2>/dev/null || true
          sed -i "s/^PKGVER ?=.*/PKGVER ?= $VERSION/" Makefile

      - name: Verify makepkg is available
        run: |
          which makepkg || {
            echo "makepkg not found in container, installing pacman package..."
            apt-get update -y || true
            apt-get install -y pacman-package-manager 2>/dev/null || {
              echo "Falling back to building tarball manually..."
              echo "SKIP_MAKEPKG=1" >> $GITHUB_ENV
            }
          }

      - name: Build pacman package
        if: env.SKIP_MAKEPKG != '1'
        run: |
          cd packaging/pacman
          makepkg -f --noconfirm || {
            echo "makepkg failed, will build tarball manually in next step"
            echo "SKIP_MAKEPKG=1" >> $GITHUB_ENV
          }

      - name: Build pacman-style tarball manually (fallback)
        if: env.SKIP_MAKEPKG == '1'
        run: |
          set -e
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ needs.check-latest.outputs.latest }}"
          fi
          ARCH=aarch64
          mkdir -p dist
          ROOT=$(mktemp -d)
          TMPUSR="$ROOT/data/data/com.termux/files/usr"
          mkdir -p "$TMPUSR/bin" "$TMPUSR/lib/bun-termux"
          # Download Bun binary
          mkdir -p /tmp/bun-dl
          curl -fL "https://github.com/oven-sh/bun/releases/download/bun-v${VERSION}/bun-linux-${ARCH}-android.zip" -o /tmp/bun-dl/bun.zip
          unzip -o /tmp/bun-dl/bun.zip -d /tmp/bun-dl/extracted >/dev/null
          BUN_BIN=$(find /tmp/bun-dl/extracted -name bun -type f | head -1)
          install -m755 "$BUN_BIN" "$TMPUSR/lib/bun-termux/bun"
          # Launcher
          cat > "$TMPUSR/bin/bun" <<'LAUNCHER'
          #!/data/data/com.termux/files/usr/bin/bash
          exec /data/data/com.termux/files/usr/lib/bun-termux/bun "$@"
          LAUNCHER
          chmod 755 "$TMPUSR/bin/bun"
          # Network fix script
          install -m755 scripts/fix-bun-network.sh "$TMPUSR/bin/bun-fix-network"
          # .PKGINFO
          cat > "$ROOT/.PKGINFO" <<EOF
          pkgname = bun
          pkgver = $VERSION-1
          pkgdesc = Android-native Bun runtime for Termux Bionic + auto network fix
          url = https://github.com/oven-sh/bun
          builddate = $(date +%Y-%m-%d)
          packager = bd-loser
          size = $(stat -c%s "$TMPUSR/lib/bun-termux/bun")
          arch = $ARCH
          license = MIT
          EOF
          # .INSTALL
          install -m755 packaging/deb/DEBIAN/postinst "$ROOT/.INSTALL"
          # Build tarball
          cd "$ROOT"
          tar -cJf "$GITHUB_WORKSPACE/dist/bun-$VERSION-1-$ARCH.pkg.tar.xz" .PKGINFO .INSTALL data/
          cd "$GITHUB_WORKSPACE"
          rm -rf "$ROOT"
          echo ""
          echo "=== Built: dist/bun-$VERSION-1-$ARCH.pkg.tar.xz ==="
          ls -la dist/

      - name: List packages
        run: |
          ls -la packaging/pacman/*.pkg.* dist/*.pkg.* 2>/dev/null || echo "No packages found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bun-pacman-aarch64
          path: |
            packaging/pacman/*.pkg.*
            dist/*.pkg.*
          retention-days: 30
          if-no-files-found: ignore

  release:
    needs: [build-deb, build-pacman, check-latest]
    runs-on: ubuntu-latest
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '') ||
        (github.event_name == 'schedule' && needs.check-latest.outputs.should_bump == 'true') ||
        startsWith(github.ref, 'refs/tags/v')
      }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ needs.check-latest.outputs.latest }}"
          fi
          echo "Releasing version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: bun-deb-aarch64
          path: dist/
        continue-on-error: true

      - name: Download pacman artifact
        uses: actions/download-artifact@v4
        with:
          name: bun-pacman-aarch64
          path: dist/
        continue-on-error: true

      - name: List release files
        run: |
          ls -la dist/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Bun for Termux v${{ steps.ver.outputs.version }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            # Bun for Termux v${{ steps.ver.outputs.version }}

            Android-native Bun runtime packaged for Termux. **No glibc, no wrapper, no grun.**

            ## Installation

            ```bash
            # Download the .deb from assets below, then:
            dpkg -i bun_${{ steps.ver.outputs.version }}_aarch64.deb
            ```

            If `bun install` fails with `ConnectionRefused`, run:

            ```bash
            bun-fix-network
            ```

            ## What's new

            - Bundles `bun-fix-network` script for automatic DNS/proxy workaround
            - `postinst` detects network issues and prints instructions
            - Built from upstream Bun v${{ steps.ver.outputs.version }} (android-aarch64)
